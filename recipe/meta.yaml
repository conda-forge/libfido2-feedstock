{% set version = "1.16.0" %}

package:
  name: libfido2
  version: {{ version }}

source:
  url: https://github.com/Yubico/libfido2/archive/{{ version }}.tar.gz
  sha256: 7d86088ef4a48f9faad4ff6f41343328157849153a8dc94d88f4b5461cb29474

build:
  number: 0
  skip: true  # [win]
  run_exports:
    - {{ pin_subpackage('libfido2', max_pin='x') }}

requirements:
  build:
    - {{ compiler('c') }}
    - {{ stdlib("c") }}
    - {{ compiler('cxx') }}
    - cmake
    - make
    - pkg-config
  host:
    - openssl
    - libcbor
    - libudev  # [linux]
    - zlib

test:
  commands:
    - test -f "${PREFIX}/lib/libfido2${SHLIB_EXT}"

about:
  home: https://github.com/Yubico/libfido2/
  license: BSD-2-Clause
  license_file: LICENSE
  summary: Provides library functionality for FIDO 2.0

extra:
  recipe-maintainers:
    - chrisburr
